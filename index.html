<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Soyao Studio - NeoRun</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5c);
      color: #f0f0f0;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 40px 0 20px;
    }
    header img {
      max-width: 200px;
      border-radius: 10px;
    }
    h1 {
      margin-top: 20px;
      font-size: 2.5em;
      color: #ff4c60;
    }
    p {
      font-size: 1.2em;
      margin: 20px auto;
      max-width: 600px;
    }
    .trailer {
      margin: 40px 0;
    }
    .trailer a {
      display: inline-block;
      background: #ffcc00;
      color: #111;
      padding: 12px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }
    .trailer a:hover {
      background: #ffaa00;
    }
    footer {
      background-color: #111;
      padding: 20px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    footer a {
      color: #ffcc00;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }
    footer a:hover {
      text-decoration: underline;
    }
    footer p {
      margin: 5px 0;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>
    <!-- Logo -->
    <img src="logo.png" alt="Logo NeoRun">
    <h1>Bienvenido a NeoRun</h1>
  </header>

  <p>Este es el sitio oficial de NeoRun, desarrollado por Soyao Studio.</p>

  <!-- Botón al tráiler -->
  <div class="trailer">
    <a href="https://www.youtube.com/@SoyaoStudio" target="_blank">
      Ver tráiler en YouTube
    </a>
  </div>

  <footer>
    <div>
      <a href="privacy-policy.html">Política de Privacidad</a> |
      <a href="terms.html">Términos del Servicio</a>
    </div>
    <p>© 2026 Soyao Studio. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
