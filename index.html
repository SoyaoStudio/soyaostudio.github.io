<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Soyao Studio - NeoRun</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5c);
      color: #f0f0f0;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      position: relative;
      width: 100%;
      height: 500px;
      overflow: hidden;
    }
    header img.banner {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 120px;
      background: rgba(0,0,0,0.4);
      color: #fff;
    }
    .overlay img.logo {
      max-width: 150px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .overlay h1 {
      font-size: 2.5em;
      color: #ff4c60;
      margin: 10px 0;
    }
    .overlay p {
      font-size: 1.2em;
      margin: 10px 0;
    }
    .social a {
      color: #ffcc00;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }
    .social a:hover {
      text-decoration: underline;
    }
    .download a {
      display: inline-block;
      margin-top: 20px;
      background: #00c853;
      color: #fff;
      padding: 12px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }
    .download a:hover {
      background: #009624;
    }
    .video {
      margin: 40px 0;
    }
    .video iframe {
      width: 100%;
      max-width: 560px;
      height: 315px;
      border-radius: 10px;
    }
    footer {
      background-color: #111;
      padding: 20px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    footer a {
      color: #ffcc00;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }
    footer a:hover {
      text-decoration: underline;
    }
    footer p {
      margin: 5px 0;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>
    <img src="banner.jpg" alt="Banner NeoRun" class="banner">
    <div class="overlay">
      <img src="logo.png" alt="Logo NeoRun" class="logo">
      <h1>Bienvenido a NeoRun</h1>
      <p>Sitio oficial desarrollado por Soyao Studio.</p>
      <div class="social">
        <a href="https://www.youtube.com/@SoyaoStudio" target="_blank">YouTube</a> |
        <a href="https://www.facebook.com/profile.php?id=61573257776209" target="_blank">Facebook</a> |
        <a href="https://www.instagram.com/soyaostudio/" target="_blank">Instagram</a>
      </div>
      <!-- Botón de descarga -->
      <div class="download">
        <a href="https://play.google.com/store/apps/details?id=com.SoyaoStudio.NeoRun" target="_blank">
          Descargar en Google Play
        </a>
      </div>
    </div>
  </header>

  <div class="video">
    <iframe 
      src="https://www.youtube.com/embed/7ZchepCSONU" 
      title="Tráiler NeoRun" 
      frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
  </div>

  <footer>
    <div>
      <a href="privacy-policy.html">Política de Privacidad</a> |
      <a href="terms.html">Términos del Servicio</a>
    </div>
    <p>©2026 Soyao Studio. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
