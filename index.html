<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Soyao Studio - NeoRun</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5c);
      color: #f0f0f0;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 40px 0 20px;
    }
    header img.logo {
      max-width: 200px;
      border-radius: 10px;
    }
    header img.banner {
      max-width: 100%;
      margin-top: 20px;
      border-radius: 8px;
    }
    h1 {
      margin-top: 20px;
      font-size: 2.5em;
      color: #ff4c60;
    }
    p {
      font-size: 1.2em;
      margin: 20px auto;
      max-width: 600px;
    }
    .social a {
      color: #ffcc00;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }
    .social a:hover {
      text-decoration: underline;
    }
    .video {
      margin: 40px 0;
    }
    .video iframe {
      max-width: 90%;
      border-radius: 10px;
    }
    .trailer a {
      display: inline-block;
      background: #ffcc00;
      color: #111;
      padding: 12px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }
    .trailer a:hover {
      background: #ffaa00;
    }
    footer {
      background-color: #111;
      padding: 20px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    footer a {
      color: #ffcc00;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }
    footer a:hover {
      text-decoration: underline;
    }
    footer p {
      margin: 5px 0;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>
    <!-- Logo -->
    <img src="logo.png" alt="Logo NeoRun" class="logo">
    <h1>Bienvenido a NeoRun</h1>
    <p>Este es el sitio oficial de NeoRun, desarrollado por Soyao Studio.</p>
    <!-- Banner -->
    <img src="banner.png" alt="Banner NeoRun" class="banner">
    <!-- Botones de redes -->
    <div class="social">
  <a href="https://www.youtube.com/@SoyaoStudio" target="_blank">YouTube</a> |
  <a href="https://www.facebook.com/profile.php?id=61573257776209" target="_blank">Facebook</a> |
  <a href="https://www.instagram.com/soyaostudio/" target="_blank">Instagram</a> |
</div>
  </header>

  <!-- Reproductor del tráiler -->
  <div class="video">
    <iframe width="560" height="315" 
      src="https://www.youtube.com/watch?v=7ZchepCSONU" 
      title="Tráiler NeoRun" 
      frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
  </div>

  <footer>
    <div>
      <a href="privacy-policy.html">Política de Privacidad</a> |
      <a href="terms.html">Términos del Servicio</a>
    </div>
    <p>©2026 Soyao Studio. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
